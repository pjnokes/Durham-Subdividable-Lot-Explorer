worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/geo+json;
    gzip_min_length 1000;
    gzip_comp_level 5;

    upstream backend {
        server backend:8000;
    }

    limit_req_zone $binary_remote_addr zone=api:10m rate=15r/s;
    limit_req_zone $binary_remote_addr zone=export:10m rate=2r/s;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://ssl.cdn-redfin.com https://*.ssl.cdn-redfin.com; connect-src 'self' https://basemaps.cartocdn.com; frame-src https://www.redfin.com; font-src 'self'" always;

        # Block docs/OpenAPI in production
        location /docs { return 404; }
        location /redoc { return 404; }
        location /openapi.json { return 404; }

        # API requests → FastAPI backend (rate-limited)
        location /api/export/ {
            limit_req zone=export burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 60s;
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 32k;
        }

        # Static assets (JS/CSS/images) — long cache
        location /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback — serve index.html for client-side routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
